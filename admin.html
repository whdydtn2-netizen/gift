<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 — 선물톡</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<link rel="stylesheet" href="common.css">
<style>
  .admin-wrap {
    max-width: 1080px;
    margin: 0 auto;
    padding: 40px 24px;
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 32px;
    align-items: start;
  }

  /* ===== Form Card ===== */
  .form-card {
    background: #fff;
    border-radius: 20px;
    padding: 28px;
    border: 1px solid #F6E3EA;
    position: sticky;
    top: 80px;
  }
  .form-card h2 {
    font-size: 18px;
    font-weight: 700;
    color: var(--pink-900);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .form-card h2 i { color: var(--pink-400); }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--pink-800);
    margin-bottom: 5px;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #F4C0D1;
    border-radius: 10px;
    font-size: 14px;
    color: var(--ink);
    background: #fff;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--pink-400); }
  .form-group textarea { resize: vertical; min-height: 72px; }

  .img-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }
  .img-tab {
    padding: 5px 12px;
    border-radius: 16px;
    border: 1.5px solid #F4C0D1;
    background: #fff;
    color: var(--pink-600);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .img-tab.active {
    background: var(--pink-50);
    border-color: var(--pink-400);
    color: var(--pink-800);
  }
  .upload-area {
    border: 2px dashed #F4C0D1;
    border-radius: 10px;
    padding: 18px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .upload-area:hover { border-color: var(--pink-400); background: var(--pink-50); }
  .upload-area i { font-size: 28px; color: var(--pink-200); display: block; margin-bottom: 6px; }
  .upload-area p { font-size: 12px; color: var(--pink-600); }
  #img-preview {
    width: 100%;
    max-height: 140px;
    object-fit: contain;
    border-radius: 8px;
    margin-top: 10px;
    display: none;
  }
  .btn-add {
    width: 100%;
    background: var(--pink-400);
    color: #fff;
    border: none;
    padding: 13px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 6px;
  }
  .btn-add:hover { background: var(--pink-600); }

  /* ===== Product List ===== */
  .product-list-panel h2 {
    font-size: 18px;
    font-weight: 700;
    color: var(--pink-900);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .product-list-panel h2 i { color: var(--pink-400); }
  .stats-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .stat-chip {
    background: #fff;
    border: 1px solid #F6E3EA;
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    color: var(--pink-800);
  }
  .stat-chip strong { color: var(--pink-400); }

  .admin-table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid #F6E3EA;
  }
  .admin-table th {
    background: var(--pink-50);
    padding: 11px 14px;
    text-align: left;
    font-size: 12px;
    font-weight: 700;
    color: var(--pink-800);
  }
  .admin-table td {
    padding: 11px 14px;
    border-top: 1px solid #F6E3EA;
    font-size: 13px;
    vertical-align: middle;
  }
  .admin-table tr:hover td { background: var(--pink-50); }
  .admin-thumb {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    object-fit: cover;
  }
  .thumb-placeholder {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    background: var(--pink-50);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--pink-200);
    font-size: 18px;
  }
  .btn-delete {
    background: none;
    border: 1.5px solid #F4C0D1;
    color: var(--pink-600);
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-delete:hover {
    background: #FFF0F5;
    border-color: var(--pink-400);
  }
  .empty-msg {
    text-align: center;
    padding: 40px;
    color: var(--pink-400);
    font-size: 14px;
    background: #fff;
    border-radius: 16px;
    border: 1px solid #F6E3EA;
  }

  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--pink-800);
    color: #fff;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 14px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ===== Auth Gate ===== */
  #auth-gate {
    position: fixed;
    inset: 0;
    background: var(--cream);
    z-index: 9998;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .gate-box {
    background: #fff;
    border-radius: 24px;
    padding: 48px 40px;
    width: 320px;
    text-align: center;
    border: 1px solid #F6E3EA;
    box-shadow: 0 16px 48px rgba(75,21,40,0.12);
  }
  .gate-box .gate-icon { font-size: 48px; color: var(--pink-400); margin-bottom: 16px; }
  .gate-box h2 { font-size: 22px; font-weight: 700; color: var(--pink-900); margin-bottom: 8px; }
  .gate-box .gate-sub { font-size: 14px; color: var(--pink-600); margin-bottom: 28px; }
  #gate-pw {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #F4C0D1;
    border-radius: 12px;
    font-size: 15px;
    outline: none;
    text-align: center;
    font-family: inherit;
    margin-bottom: 12px;
    letter-spacing: 3px;
    transition: border-color 0.15s;
  }
  #gate-pw:focus { border-color: var(--pink-400); }
  #gate-pw::placeholder { letter-spacing: 0; }
  .gate-btn {
    width: 100%;
    background: var(--pink-400);
    color: #fff;
    border: none;
    padding: 13px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 8px;
  }
  .gate-btn:hover { background: var(--pink-600); }
  .gate-back { display: block; font-size: 13px; color: var(--pink-600); margin-top: 14px; }
  .gate-back:hover { color: var(--pink-400); }
  #gate-err { color: var(--pink-400); font-size: 13px; margin-top: 10px; min-height: 18px; }

  /* ===== Tier builder ===== */
  .tier-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr auto 1fr auto;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
  }
  .tier-row input {
    padding: 8px 10px;
    border: 1.5px solid #F4C0D1;
    border-radius: 8px;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    width: 100%;
    font-family: inherit;
  }
  .tier-row input:focus { border-color: var(--pink-400); }
  .tier-row span { font-size: 12px; color: var(--pink-600); white-space: nowrap; }
  .tier-del {
    width: 26px;
    height: 26px;
    border: none;
    background: var(--pink-50);
    color: var(--pink-400);
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .tier-del:hover { background: var(--pink-100); }
  .tier-add-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    background: none;
    border: 1.5px dashed #F4C0D1;
    color: var(--pink-600);
    font-size: 12px;
    font-weight: 600;
    padding: 7px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
    justify-content: center;
    margin-top: 4px;
  }
  .tier-add-btn:hover { border-color: var(--pink-400); background: var(--pink-50); }
  .tier-hint { font-size: 11px; color: var(--pink-400); margin-top: 5px; }

  /* Option checkboxes */
  .opt-checks { display: flex; gap: 10px; flex-wrap: wrap; }
  .opt-check {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--pink-800);
    cursor: pointer;
    padding: 8px 14px;
    border: 1.5px solid #F4C0D1;
    border-radius: 20px;
    transition: all 0.15s;
  }
  .opt-check:hover { border-color: var(--pink-400); background: var(--pink-50); }
  .opt-check input { accent-color: var(--pink-400); }
  .opt-check i { color: var(--pink-400); }
  .opt-check:has(input:checked) { border-color: var(--pink-400); background: var(--pink-50); color: var(--pink-600); }

  .btn-edit {
    background: var(--amber-50);
    border: 1.5px solid var(--amber-200);
    color: var(--amber-800);
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    margin-right: 4px;
  }
  .btn-edit:hover { background: var(--amber-100); border-color: var(--amber-600); }

  /* ===== Edit Modal ===== */
  #edit-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(75,21,40,0.55);
    backdrop-filter: blur(5px);
    z-index: 5000;
    align-items: flex-start;
    justify-content: center;
    overflow-y: auto;
    padding: 24px 16px;
  }
  #edit-modal.open { display: flex; }
  #edit-box {
    background: #fff;
    border-radius: 20px;
    width: min(560px, 100%);
    padding: 32px;
    margin: auto;
    position: relative;
  }
  .edit-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .edit-header h2 {
    font-size: 18px;
    font-weight: 700;
    color: var(--pink-900);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .edit-header h2 i { color: var(--amber-600); }
  .edit-close {
    width: 32px;
    height: 32px;
    border: none;
    background: var(--pink-50);
    color: var(--pink-600);
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .edit-close:hover { background: var(--pink-100); }
  .edit-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .btn-edit-save {
    flex: 1;
    background: var(--pink-400);
    color: #fff;
    border: none;
    padding: 13px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-edit-save:hover { background: var(--pink-600); }
  .btn-edit-cancel {
    flex: 1;
    background: none;
    border: 1.5px solid #F4C0D1;
    color: var(--pink-600);
    padding: 13px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-edit-cancel:hover { background: var(--pink-50); }
  .edit-img-preview {
    width: 100%;
    max-height: 120px;
    object-fit: contain;
    border-radius: 8px;
    margin-top: 8px;
    display: none;
  }

  .logout-btn {
    font-size: 12px;
    font-weight: 600;
    color: var(--pink-600);
    background: none;
    border: 1.5px solid #F4C0D1;
    padding: 6px 14px;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .logout-btn:hover { background: var(--pink-50); border-color: var(--pink-400); }

  @media (max-width: 800px) {
    .admin-wrap { grid-template-columns: 1fr; }
    .form-card { position: static; }
    .gate-box { width: 88%; padding: 36px 28px; }
  }
</style>
</head>
<body>

<!-- 인증 게이트 -->
<div id="auth-gate">
  <div class="gate-box">
    <div class="gate-icon"><i class="ti ti-lock"></i></div>
    <h2>관리자 로그인</h2>
    <p class="gate-sub">선물톡 관리자 전용 페이지입니다</p>
    <input type="text" id="gate-id" placeholder="아이디 입력"
      style="width:100%;padding:12px 16px;border:1.5px solid #F4C0D1;border-radius:12px;font-size:15px;outline:none;text-align:center;font-family:inherit;margin-bottom:8px;transition:border-color 0.15s;"
      onkeydown="if(event.key==='Enter')gateLogin()">
    <input type="password" id="gate-pw" placeholder="비밀번호 입력"
      onkeydown="if(event.key==='Enter')gateLogin()">
    <button class="gate-btn" onclick="gateLogin()">로그인</button>
    <a href="index.html" class="gate-back">← 사이트로 돌아가기</a>
    <div id="gate-err"></div>
  </div>
</div>
<script>
  if (sessionStorage.getItem('giftalk_admin')) {
    document.getElementById('auth-gate').style.display = 'none';
  } else {
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('gate-pw').focus();
    });
  }
</script>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">선물톡 <span>giftalk</span></a>
    <nav>
      <a href="gift-list.html">선물 목록</a>
      <a href="wedding.html">결혼·돌잔치답례</a>
      <a href="graduation.html">졸업선물</a>
      <a href="holiday.html">명절선물</a>
      <a href="gathering.html">모임선물</a>
      <a href="contact.html">고객문의</a>
    </nav>
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="font-size:12px;font-weight:700;color:var(--amber-600);background:var(--amber-50);padding:6px 12px;border-radius:14px;">관리자</span>
      <button class="logout-btn" onclick="adminLogout()"><i class="ti ti-logout" style="font-size:12px;"></i> 로그아웃</button>
    </div>
  </div>
</header>

<div class="page-banner">
  <h1>관리자 페이지</h1>
  <p>상품을 추가하고 카테고리별로 관리하세요</p>
</div>

<div class="admin-wrap">

  <!-- 상품 추가 폼 -->
  <div class="form-card">
    <h2><i class="ti ti-plus"></i> 상품 추가</h2>

    <div class="form-group">
      <label>상품명 *</label>
      <input type="text" id="p-name" placeholder="예: 프리미엄 선물세트">
    </div>

    <div class="form-group">
      <label>수량별 가격 설정 *</label>
      <div id="tier-list"></div>
      <button type="button" class="tier-add-btn" onclick="addTier()"><i class="ti ti-plus"></i> 구간 추가</button>
      <p class="tier-hint">최대 수량을 비워두면 해당 수량 이상 전체 적용</p>
    </div>

    <div class="form-group">
      <label>제공 옵션</label>
      <div class="opt-checks">
        <label class="opt-check"><input type="checkbox" id="p-has-wrapping"> <i class="ti ti-box"></i> 포장 옵션</label>
        <label class="opt-check"><input type="checkbox" id="p-has-print"> <i class="ti ti-writing"></i> 인쇄 옵션</label>
      </div>
    </div>

    <div class="form-group">
      <label>카테고리 * <span style="font-size:11px;color:var(--pink-400);">(복수 선택 가능)</span></label>
      <div class="opt-checks" style="flex-direction:column;gap:8px;">
        <label class="opt-check"><input type="checkbox" name="p-cat" value="wedding"> 결혼·돌잔치답례</label>
        <label class="opt-check"><input type="checkbox" name="p-cat" value="graduation"> 졸업선물</label>
        <label class="opt-check"><input type="checkbox" name="p-cat" value="holiday"> 명절선물</label>
        <label class="opt-check"><input type="checkbox" name="p-cat" value="gathering"> 모임선물</label>
      </div>
    </div>

    <div class="form-group">
      <label>상품 설명</label>
      <textarea id="p-desc" placeholder="상품에 대한 간단한 설명"></textarea>
    </div>

    <div class="form-group">
      <label>이미지</label>
      <div class="img-tabs">
        <button class="img-tab active" onclick="switchTab('url', this)">URL 입력</button>
        <button class="img-tab" onclick="switchTab('file', this)">파일 업로드</button>
      </div>
      <div id="tab-url">
        <input type="text" id="p-img-url" placeholder="이미지 URL (선택사항)">
      </div>
      <div id="tab-file" style="display:none;">
        <label for="p-img-file" class="upload-area">
          <i class="ti ti-cloud-upload"></i>
          <p>클릭하여 이미지 선택</p>
        </label>
        <input type="file" id="p-img-file" accept="image/*" style="display:none;" onchange="previewImg(this)">
        <img id="img-preview">
      </div>
    </div>

    <button class="btn-add" onclick="submitProduct()">상품 추가하기</button>
  </div>

  <!-- 상품 목록 -->
  <div class="product-list-panel">
    <h2><i class="ti ti-list"></i> 등록된 상품</h2>
    <div class="stats-row" id="stats-row"></div>
    <div id="product-list-area"></div>
  </div>

</div>

<!-- 상품 수정 모달 -->
<div id="edit-modal">
  <div id="edit-box">
    <div class="edit-header">
      <h2><i class="ti ti-edit"></i> 상품 수정</h2>
      <button class="edit-close" onclick="closeEditModal()">×</button>
    </div>

    <div class="form-group">
      <label>상품명 *</label>
      <input type="text" id="e-name" placeholder="상품명">
    </div>

    <div class="form-group">
      <label>수량별 가격 설정 *</label>
      <div id="edit-tier-list"></div>
      <button type="button" class="tier-add-btn" onclick="addEditTier()"><i class="ti ti-plus"></i> 구간 추가</button>
      <p class="tier-hint">최대 수량을 비워두면 해당 수량 이상 전체 적용</p>
    </div>

    <div class="form-group">
      <label>제공 옵션</label>
      <div class="opt-checks">
        <label class="opt-check"><input type="checkbox" id="e-has-wrapping"> <i class="ti ti-box"></i> 포장 옵션</label>
        <label class="opt-check"><input type="checkbox" id="e-has-print"> <i class="ti ti-writing"></i> 인쇄 옵션</label>
      </div>
    </div>

    <div class="form-group">
      <label>카테고리 * <span style="font-size:11px;color:var(--pink-400);">(복수 선택 가능)</span></label>
      <div class="opt-checks" style="flex-direction:column;gap:8px;">
        <label class="opt-check"><input type="checkbox" name="e-cat" value="wedding"> 결혼·돌잔치답례</label>
        <label class="opt-check"><input type="checkbox" name="e-cat" value="graduation"> 졸업선물</label>
        <label class="opt-check"><input type="checkbox" name="e-cat" value="holiday"> 명절선물</label>
        <label class="opt-check"><input type="checkbox" name="e-cat" value="gathering"> 모임선물</label>
      </div>
    </div>

    <div class="form-group">
      <label>상품 설명</label>
      <textarea id="e-desc" placeholder="상품 설명"></textarea>
    </div>

    <div class="form-group">
      <label>이미지 URL <span style="font-size:11px;color:var(--pink-400);">(비워두면 기존 이미지 유지)</span></label>
      <input type="text" id="e-img-url" placeholder="새 이미지 URL 입력 (선택)">
      <label for="e-img-file" style="display:inline-flex;align-items:center;gap:6px;margin-top:8px;cursor:pointer;font-size:12px;color:var(--pink-600);">
        <i class="ti ti-upload"></i> 또는 새 파일 업로드
      </label>
      <input type="file" id="e-img-file" accept="image/*" style="display:none;" onchange="previewEditImg(this)">
      <img id="edit-img-preview" class="edit-img-preview">
    </div>

    <div class="edit-actions">
      <button class="btn-edit-cancel" onclick="closeEditModal()">취소</button>
      <button class="btn-edit-save" onclick="saveEdit()"><i class="ti ti-check"></i> 저장하기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer>
  © 2026 선물톡 (giftalk). 대외비 시안 — 실제 상호·연락처는 추후 확정 예정입니다.
</footer>

<script src="common.js"></script>
<script>
var ADMIN_ID = 'jsmart01';
var ADMIN_PW = 'ks-10293035';
var imgMode = 'url';
var base64Image = null;
var tierCount = 0;

/* ===== Tier Builder ===== */
function addTier() {
  tierCount++;
  var id = tierCount;
  var div = document.createElement('div');
  div.className = 'tier-row';
  div.id = 'tier-' + id;
  div.innerHTML =
    '<input type="number" class="t-min" placeholder="최소 수량" min="1">' +
    '<span>~</span>' +
    '<input type="number" class="t-max" placeholder="최대(선택)">' +
    '<span>개 / 단가</span>' +
    '<input type="number" class="t-price" placeholder="0원" min="0">' +
    '<button type="button" class="tier-del" onclick="removeTier(' + id + ')">×</button>';
  document.getElementById('tier-list').appendChild(div);
}

function removeTier(id) {
  var el = document.getElementById('tier-' + id);
  if (el) el.remove();
}

function getCheckedCats(name) {
  var cats = [];
  document.querySelectorAll('input[name="' + name + '"]:checked').forEach(function(el) {
    cats.push(el.value);
  });
  return cats;
}

function getTiers() {
  var rows = document.querySelectorAll('#tier-list .tier-row');
  var tiers = [];
  rows.forEach(function(row) {
    var min = row.querySelector('.t-min').value.trim();
    var max = row.querySelector('.t-max').value.trim();
    var price = row.querySelector('.t-price').value.trim();
    if (min && price) {
      tiers.push({ min: Number(min), max: max ? Number(max) : null, price: Number(price) });
    }
  });
  return tiers;
}

function gateLogin() {
  var id = document.getElementById('gate-id').value.trim();
  var pw = document.getElementById('gate-pw').value;
  if (id === ADMIN_ID && pw === ADMIN_PW) {
    sessionStorage.setItem('giftalk_admin', '1');
    document.getElementById('auth-gate').style.display = 'none';
  } else {
    document.getElementById('gate-err').textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
    document.getElementById('gate-pw').value = '';
    document.getElementById('gate-pw').focus();
  }
}

function adminLogout() {
  sessionStorage.removeItem('giftalk_admin');
  window.location.href = 'index.html';
}

function switchTab(mode, btn) {
  imgMode = mode;
  document.querySelectorAll('.img-tab').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('tab-url').style.display = mode === 'url' ? '' : 'none';
  document.getElementById('tab-file').style.display = mode === 'file' ? '' : 'none';
}

function previewImg(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    base64Image = e.target.result;
    var preview = document.getElementById('img-preview');
    preview.src = base64Image;
    preview.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function getImgValue() {
  if (imgMode === 'url') return document.getElementById('p-img-url').value.trim();
  return base64Image || '';
}

function submitProduct() {
  var name = document.getElementById('p-name').value.trim();
  var category = document.getElementById('p-category').value;
  var description = document.getElementById('p-desc').value.trim();
  var image = getImgValue();
  var tiers = getTiers();
  var categories = getCheckedCats('p-cat');
  var hasWrapping = document.getElementById('p-has-wrapping').checked;
  var hasPrint = document.getElementById('p-has-print').checked;

  if (!name) { showToast('상품명을 입력해주세요.'); return; }
  if (!tiers.length) { showToast('수량별 가격을 최소 1개 설정해주세요.'); return; }
  if (!categories.length) { showToast('카테고리를 하나 이상 선택해주세요.'); return; }

  addProduct({ name: name, priceTiers: tiers, categories: categories, description: description, image: image, hasWrapping: hasWrapping, hasPrint: hasPrint });
  showToast('상품이 추가되었습니다!');
  resetForm();
  renderList();
  renderStats();
}

function resetForm() {
  document.getElementById('p-name').value = '';
  document.getElementById('p-category').value = '';
  document.getElementById('p-desc').value = '';
  document.getElementById('p-img-url').value = '';
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('p-has-wrapping').checked = false;
  document.getElementById('p-has-print').checked = false;
  document.querySelectorAll('input[name="p-cat"]').forEach(function(el) { el.checked = false; });
  document.getElementById('tier-list').innerHTML = '';
  tierCount = 0;
  base64Image = null;
  addTier();
}

function renderStats() {
  var products = getProducts();
  var counts = {};
  products.forEach(function(p) { counts[p.category] = (counts[p.category] || 0) + 1; });
  var html = '<div class="stat-chip">전체 <strong>' + products.length + '</strong>개</div>';
  Object.keys(CATEGORY_LABELS).forEach(function(key) {
    html += '<div class="stat-chip">' + CATEGORY_LABELS[key] + ' <strong>' + (counts[key] || 0) + '</strong>개</div>';
  });
  document.getElementById('stats-row').innerHTML = html;
}

function renderList() {
  var products = getProducts();
  var area = document.getElementById('product-list-area');

  if (products.length === 0) {
    area.innerHTML = '<div class="empty-msg">등록된 상품이 없습니다. 왼쪽 폼에서 상품을 추가해보세요.</div>';
    return;
  }

  var rows = products.map(function(p) {
    var thumbHtml = p.image
      ? '<img src="' + escapeHtml(p.image) + '" class="admin-thumb" alt="" onerror="this.outerHTML=\'<div class=\\\'thumb-placeholder\\\'><i class=\\\'ti ti-photo\\\'></i></div>\'">'
      : '<div class="thumb-placeholder"><i class="ti ti-photo"></i></div>';
    return '<tr>' +
      '<td>' + thumbHtml + '</td>' +
      '<td style="font-weight:600;">' + escapeHtml(p.name) + '</td>' +
      '<td>' + getProductCategories(p).map(function(c) { return '<span class="product-category-badge">' + (CATEGORY_LABELS[c] || c) + '</span>'; }).join(' ') + '</td>' +
      '<td style="color:var(--pink-400);font-weight:600;">' + getStartingPrice(p).toLocaleString() + '원~</td>' +
      '<td>' +
        '<button class="btn-edit" onclick="openEditModal(\'' + p.id + '\')"><i class="ti ti-edit" style="font-size:11px;"></i> 수정</button>' +
        '<button class="btn-delete" onclick="confirmDelete(\'' + p.id + '\', \'' + escapeHtml(p.name) + '\')">삭제</button>' +
      '</td>' +
    '</tr>';
  }).join('');

  area.innerHTML =
    '<table class="admin-table">' +
      '<thead><tr><th>이미지</th><th>상품명</th><th>카테고리</th><th>가격</th><th>작업</th></tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table>';
}

/* ===== Edit Modal ===== */
var editingId = null;
var editTierCount = 0;
var editBase64Image = null;

function openEditModal(id) {
  var p = getProductById(id);
  if (!p) return;
  editingId = id;
  editBase64Image = null;

  document.getElementById('e-name').value = p.name || '';
  document.getElementById('e-desc').value = p.description || '';
  document.getElementById('e-has-wrapping').checked = !!p.hasWrapping;
  document.getElementById('e-has-print').checked = !!p.hasPrint;
  var existingCats = getProductCategories(p);
  document.querySelectorAll('input[name="e-cat"]').forEach(function(el) {
    el.checked = existingCats.indexOf(el.value) !== -1;
  });

  // 이미지: URL이면 표시, base64면 미리보기만
  var imgEl = document.getElementById('e-img-url');
  var previewEl = document.getElementById('edit-img-preview');
  if (p.image && !p.image.startsWith('data:')) {
    imgEl.value = p.image;
    previewEl.style.display = 'none';
  } else if (p.image) {
    imgEl.value = '';
    previewEl.src = p.image;
    previewEl.style.display = 'block';
  } else {
    imgEl.value = '';
    previewEl.style.display = 'none';
  }

  // 가격 구간 채우기
  var list = document.getElementById('edit-tier-list');
  list.innerHTML = '';
  editTierCount = 0;
  var tiers = p.priceTiers && p.priceTiers.length ? p.priceTiers
    : (p.price ? [{ min: 1, max: null, price: p.price }] : []);
  if (tiers.length) {
    tiers.forEach(function(t) { addEditTier(t.min, t.max, t.price); });
  } else {
    addEditTier();
  }

  document.getElementById('edit-modal').classList.add('open');
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('open');
  editingId = null;
}

function addEditTier(min, max, price) {
  editTierCount++;
  var id = editTierCount;
  var div = document.createElement('div');
  div.className = 'tier-row';
  div.id = 'etier-' + id;
  div.innerHTML =
    '<input type="number" class="t-min" placeholder="최소 수량" min="1" value="' + (min != null ? min : '') + '">' +
    '<span>~</span>' +
    '<input type="number" class="t-max" placeholder="최대(선택)" value="' + (max != null ? max : '') + '">' +
    '<span>개 / 단가</span>' +
    '<input type="number" class="t-price" placeholder="0원" min="0" value="' + (price != null ? price : '') + '">' +
    '<button type="button" class="tier-del" onclick="removeEditTier(' + id + ')">×</button>';
  document.getElementById('edit-tier-list').appendChild(div);
}

function removeEditTier(id) {
  var el = document.getElementById('etier-' + id);
  if (el) el.remove();
}

function getEditTiers() {
  var tiers = [];
  document.querySelectorAll('#edit-tier-list .tier-row').forEach(function(row) {
    var min = row.querySelector('.t-min').value.trim();
    var max = row.querySelector('.t-max').value.trim();
    var price = row.querySelector('.t-price').value.trim();
    if (min && price) tiers.push({ min: Number(min), max: max ? Number(max) : null, price: Number(price) });
  });
  return tiers;
}

function previewEditImg(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    editBase64Image = e.target.result;
    var prev = document.getElementById('edit-img-preview');
    prev.src = editBase64Image;
    prev.style.display = 'block';
    document.getElementById('e-img-url').value = '';
  };
  reader.readAsDataURL(file);
}

function saveEdit() {
  var name = document.getElementById('e-name').value.trim();
  var tiers = getEditTiers();
  var categories = getCheckedCats('e-cat');

  if (!name) { showToast('상품명을 입력해주세요.'); return; }
  if (!tiers.length) { showToast('수량별 가격을 최소 1개 설정해주세요.'); return; }
  if (!categories.length) { showToast('카테고리를 하나 이상 선택해주세요.'); return; }

  var urlInput = document.getElementById('e-img-url').value.trim();
  var newImage = editBase64Image || urlInput || null;
  var existing = getProductById(editingId);
  var finalImage = newImage !== null ? newImage : (existing ? existing.image : '');

  updateProduct(editingId, {
    name: name,
    categories: categories,
    description: document.getElementById('e-desc').value.trim(),
    image: finalImage,
    priceTiers: tiers,
    hasWrapping: document.getElementById('e-has-wrapping').checked,
    hasPrint: document.getElementById('e-has-print').checked
  });

  closeEditModal();
  renderList();
  renderStats();
  showToast('상품이 수정되었습니다!');
}

// 모달 바깥 클릭 시 닫기
document.addEventListener('click', function(e) {
  if (e.target === document.getElementById('edit-modal')) closeEditModal();
});

function confirmDelete(id, name) {
  if (confirm('"' + name + '"을(를) 삭제하시겠습니까?')) {
    deleteProduct(id);
    renderList();
    renderStats();
    showToast('상품이 삭제되었습니다.');
  }
}

function showToast(msg) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 2500);
}

renderList();
renderStats();
addTier();
</script>
</body>
</html>
