<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고객문의 — 선물톡</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<link rel="stylesheet" href="common.css?v=3">
<style>
  .contact-wrap {
    max-width: 600px;
    margin: 0 auto;
    padding: 48px 24px;
  }
  .contact-card {
    background: #fff;
    border-radius: 20px;
    padding: 36px;
    border: 1px solid #F6E3EA;
  }
  .contact-card h2 {
    font-size: 20px;
    font-weight: 700;
    color: var(--pink-900);
    margin-bottom: 6px;
  }
  .contact-sub {
    font-size: 14px;
    color: var(--pink-600);
    margin-bottom: 28px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--pink-800);
    margin-bottom: 6px;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #F4C0D1;
    border-radius: 10px;
    font-size: 14px;
    color: var(--ink);
    background: #fff;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--pink-400); }
  .form-group textarea { resize: vertical; min-height: 120px; }
  .btn-submit {
    width: 100%;
    background: var(--pink-400);
    color: #fff;
    border: none;
    padding: 13px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 8px;
  }
  .btn-submit:hover { background: var(--pink-600); }
  .contact-info {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid #F6E3EA;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .contact-info-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--pink-600);
  }
  .contact-info-item i { color: var(--pink-400); font-size: 18px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">선물톡 <span>giftalk</span></a>
    <nav>
      <a href="gift-list.html">선물 목록</a>
      <a href="wedding.html">결혼·돌잔치답례</a>
      <a href="graduation.html">졸업선물</a>
      <a href="holiday.html">명절선물</a>
      <a href="gathering.html">모임선물</a>
      <a href="celebration.html">축하선물</a>
      <a href="contact.html" class="active">고객문의</a>
    </nav>
    <button class="cta-btn" onclick="window.location.href='quote.html'">견적받기</button>
  </div>
</header>

<div class="page-banner">
  <h1>고객문의</h1>
  <p>궁금한 점이 있으시면 언제든지 문의해주세요</p>
</div>

<div class="contact-wrap">
  <div class="contact-card">
    <h2>문의하기</h2>
    <p class="contact-sub">담당자가 1~2 영업일 내에 답변드립니다.</p>

    <div class="form-group">
      <label>이름 *</label>
      <input type="text" id="c-name" placeholder="홍길동">
    </div>
    <div class="form-group">
      <label>연락처 *</label>
      <input type="tel" id="c-phone" placeholder="010-0000-0000">
    </div>
    <div class="form-group">
      <label>이메일</label>
      <input type="email" id="c-email" placeholder="example@email.com">
    </div>
    <div class="form-group">
      <label>문의 유형</label>
      <select id="c-type">
        <option value="">선택해주세요</option>
        <option>결혼식 답례품 문의</option>
        <option>돌잔치 답례품 문의</option>
        <option>졸업선물 문의</option>
        <option>명절선물 문의</option>
        <option>모임선물 문의</option>
        <option>축하선물 문의</option>
        <option>주문제작 문의</option>
        <option>기타</option>
      </select>
    </div>
    <div class="form-group">
      <label>문의 내용 *</label>
      <textarea id="c-message" placeholder="문의하실 내용을 자세히 입력해주세요."></textarea>
    </div>

    <button class="btn-submit" onclick="submitContact()">문의 보내기</button>

    <div class="contact-info">
      <div class="contact-info-item"><i class="ti ti-clock"></i> 평일 09:00 – 18:00</div>
      <div class="contact-info-item"><i class="ti ti-calendar-off"></i> 주말·공휴일 휴무</div>
    </div>
  </div>
</div>

<footer>
  © 2026 선물톡 (giftalk). 대외비 시안 — 실제 상호·연락처는 추후 확정 예정입니다.
</footer>

<script>
function submitContact() {
  var name = document.getElementById('c-name').value.trim();
  var phone = document.getElementById('c-phone').value.trim();
  var message = document.getElementById('c-message').value.trim();
  if (!name || !phone || !message) {
    alert('이름, 연락처, 문의 내용은 필수입니다.');
    return;
  }
  alert('문의가 접수되었습니다.\n빠른 시일 내에 답변드리겠습니다.');
  document.getElementById('c-name').value = '';
  document.getElementById('c-phone').value = '';
  document.getElementById('c-email').value = '';
  document.getElementById('c-type').value = '';
  document.getElementById('c-message').value = '';
}
</script>
</body>
</html>
